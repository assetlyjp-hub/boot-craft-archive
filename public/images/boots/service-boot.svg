    <circle cx="125" cy="65" r="3" fill="#B8860B" opacity="0.5"/>
    <circle cx="95" cy="80" r="3" fill="#B8860B" opacity="0.5"/>
    <circle cx="125" cy="80" r="3" fill="#B8860B" opacity="0.5"/>
    <circle cx="95" cy="95" r="3" fill="#B8860B" opacity="0.5"/>
    <circle cx="125" cy="95" r="3" fill="#B8860B" opacity="0.5"/>
